<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">
          <svg viewBox="0 0 18 15" width="18px" height="15px">
            <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C15.335,0,16,0.665,16,1.484l0,0C16,2.304,15.335,2.969,14.516,2.969z M18,7.516C18,8.335,17.335,9,16.516,9H1.484 C0.665,9,0,8.335,0,7.516l0,0c0-0.82,0.665-1.484,1.484-1.484h15.032C15.335,6.031,16,6.696,16,7.516L16,7.516z M18,13.516 C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.484,1.484-1.484h15.032 C15.335,12.031,16,12.696,16,13.516L16,13.516z"/>
          </svg>
        </span>
      </label>
      <div class="trigger">
        {% for page in site.pages %}
          {% if page.title and page.nav_exclude != true %}
            <a class="page-link" href="{{ page.url | relative_url }}">{{ page.title }}</a>
          {% endif %}
        {% endfor %}
      </div>
    </nav>
  </div>
</header>
